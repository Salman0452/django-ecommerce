{% extends 'base.html' %}

{% block title %}Profile{% endblock %}

{% block content %}
<h1>My Profile</h1>
<p><strong>Email:</strong> {{ profile_user.email }}</p>

<h2>Edit Profile</h2>
<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Save Changes</button>
</form>
{% endblock %}
